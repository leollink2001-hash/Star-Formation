<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Cosmologia</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: rgb(255, 255, 255);
            color: rgb(0, 0, 0);
            text-align: center;
        }

        .canvas-container {
            width: 800px;
            margin: 20px auto;
            border: 4px solid #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .canvas-container-bottom {
            width: 600px;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #bottomCanvas {
            width: 100%;
            height: 100%;
            border: 1px solid #ccc;
        }


        .radio-group {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-family: sans-serif;
            font-size: 14px;
        }

        .radio-item {
            text-align: center;
        }

        .radio-item input[type="radio"] {
            display: block;
            margin: 0 auto 5px;
        }


        .disabled {
            opacity: 0.4;
        }


        .shop {
            margin-top: 20px;
            margin-bottom: 80px;
            width: 600px;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            min-height: 200px;
            /* Altezza minima opzionale */
            border: 1px solid #ccc;
            border-radius: 10px;
            overflow: hidden;
        }



        /* Proporzione 1/3 */
        .wallet-column {
            flex: 1;
            background-color: #f0f4f8;
            /* Un colore leggero per distinguerlo */
            display: flex;
            align-items: center;
            /* Centra verticalmente */
            justify-content: center;
            /* Centra orizzontalmente */
            text-align: center;
            border-right: 1px solid #ddd;
        }

        /* Proporzione 2/3 */
        .items-column {
            flex: 2;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
            /* Allinea gli item al centro della colonna */
            gap: 15px;
            /* Spazio tra gli item */
        }

        /* Stile per quando l'item è sbloccato */
        .unlocked-text {
            color: #888;
            text-decoration: line-through;
        }

        .shop-item {
            display: flex;
            align-items: center;
            /* Allinea checkbox e testo sulla stessa linea */
            gap: 10px;
            /* Spazio tra checkbox e label */
            width: 100%;
            /* Occupa tutta la larghezza disponibile */
        }

        .shop-item label {
            display: flex;
            font-weight: bold;
            justify-content: space-between;
            /* Spinge il nome a sinistra e il prezzo a destra */
            flex-grow: 1;
            /* Fa sì che la label occupi tutto lo spazio rimanente */
            cursor: pointer;
        }

        .item-price {
            font-weight: normal;
            font-style: italic;
            /* Un tocco di colore opzionale per il prezzo */
            margin-left: 20px;
            /* Spazio minimo di sicurezza */
        }
    </style>

    <script src="objectos_est.js"></script>
    <script src="ausiliarie.js"></script>
</head>

<body>

    <h1>✨Trazar la formación estelar✨</h1>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="canvas-container-bottom">
        <canvas id="bottomCanvas" width="800" height="167"></canvas>
        <div class="radio-group" id="radioGroup"></div>
    </div>

    <button onclick="open_game()">¡Jugar!</button>

    <script>
        function open_game() {
            window.open('game.html', '_self');
        }
    </script>

    </div>


    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const bottomCanvas = document.getElementById("bottomCanvas");
        const ctx2 = bottomCanvas.getContext("2d");

        const img = new Image();
        img.src = "wave.png";

        img.onload = () => {
            ctx2.drawImage(img, 0, 0, bottomCanvas.width, bottomCanvas.height);
            const visible = frequencies.find(f => f.name === "Visible");
            drawBanda(visible);
        };

        let actual_wave = 'Visible';


        const frequencies = [
            { name: "Radio", wavelength: "10^3 m", enabled: true, start: 0.02, end: 0.15 },
            //{ name: "Microwave", wavelength: "10^-2 m", enabled: true, start: 0.15, end: 0.35 },
            { name: "HI", wavelength: "21 cm", enabled: true, start: 0.14, end: 0.16 },
            { name: "CO", wavelength: "2.6 mm", enabled: true, start: 0.34, end: 0.36 },
            { name: "Far Infrared", wavelength: "10^-4 m", enabled: true, start: 0.35, end: 0.405 },
            { name: "Near Infrared", wavelength: "10^-5 m", enabled: true, start: 0.405, end: 0.46 },
            //{ name: "Infrared", wavelength: "10^-4 m", enabled: false, start: 0.35, end: 0.46 },
            { name: "Visible", wavelength: "10^-6 m", enabled: true, start: 0.46, end: 0.60 },
            { name: "Hα", wavelength: "656,3 nm", enabled: true, start: 0.57, end: 0.59 },
            { name: "Ultraviolet", wavelength: "10^-8 m", enabled: true, start: 0.60, end: 0.73 },
            { name: "X-ray", wavelength: "10^-10 m", enabled: true, start: 0.73, end: 0.84 },
            //{ name: "Gamma", wavelength: "10^-12 m", enabled: true, start: 0.84, end: 0.98 }
        ];

        const radioGroup = document.getElementById("radioGroup");

        frequencies.forEach((freq, index) => {
            const wrapper = document.createElement("div");
            wrapper.className = "radio-item";

            if (!freq.enabled) {
                wrapper.classList.add("disabled");
            }

            const radio = document.createElement("input");
            radio.type = "radio";
            radio.name = "frequency";
            radio.value = freq.name;
            radio.disabled = !freq.enabled;

            if (freq.name == "Visible") {
                radio.checked = true;
            }

            const label = document.createElement("label");
            label.textContent = `${freq.name}`;

            wrapper.appendChild(radio);
            wrapper.appendChild(label);

            radioGroup.appendChild(wrapper);

            radio.addEventListener("change", () => {
                drawBanda(freq);
                actual_wave = freq.name;
                draw()
            });
        });


        function drawBanda(selectedFreq) {
            // pulisci
            ctx2.clearRect(0, 0, bottomCanvas.width, bottomCanvas.height);

            // ridisegna immagine
            ctx2.drawImage(img, 0, 0, bottomCanvas.width, bottomCanvas.height);

            if (!selectedFreq) return;

            // calcolo posizione
            const xStart = selectedFreq.start * bottomCanvas.width;
            const xEnd = selectedFreq.end * bottomCanvas.width;
            const width = xEnd - xStart;

            // rettangolo evidenziatore
            ctx2.fillStyle = "rgba(255, 255, 0, 0.4)"; // giallo trasparente
            ctx2.fillRect(xStart, 0, width, bottomCanvas.height);
            ctx2.lineWidth = 4;
            ctx2.strokeStyle = "rgba(255, 100, 0, 255)"; // giallo trasparente
            ctx2.strokeRect(xStart, 0, width, bottomCanvas.height, 30);
        }



        // Dimensione del "cubo virtuale"
        let SPACE_WIDTH;
        let SPACE_HEIGHT;
        let SPACE_DEPTH;

        let DUST_ALPHA = 0.8;

        const N_STELLE_YEAR = 4;
        const R_STELLE = 8;

        const N_LUMPS = 300;
        const R_LUMP = 40;

        const N_DUST = 170;
        const R_DUST = 7;

        const R_GAS = 60;
        const N_GAS = 100;

        const N_YEARS = 9;

        // Resize automatico
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;

            // Spazio 3D proporzionato al canvas
            SPACE_WIDTH = canvas.width;
            SPACE_HEIGHT = canvas.height;
            SPACE_DEPTH = canvas.height; // come hai richiesto
            
        }
        //window.addEventListener("resize", resizeCanvas);
        resizeCanvas();
        


        // Lista oggetti
        let objects = [];

        // Creazione stelle e gas per N_YEARS anni
        for (let year = 1; year <= N_YEARS; year++) {
            for (let i = 0; i < N_STELLE_YEAR; i++) {
                let x_star = randomX();
                let y_star = randomY();
                let z_star = randomZ();
                objects.push(new Star(
                    x_star,
                    y_star,
                    z_star,
                    Math.random() * R_STELLE + 3,   // raggio
                    Math.random() * 10 + 1,         // massa
                    year + 1                        // nuovo attributo year
                ));

                // Creazione Gas
                if (year >= N_YEARS - 3) {
                    for (let i = 0; i < 3; i++) {
                        objects.push(new Gas(
                            x_star + (Math.random() - 0.5) * R_GAS,
                            y_star + (Math.random() - 0.5) * R_GAS,
                            z_star + (Math.random() - 0.5) * R_GAS,
                            N_GAS,
                            R_GAS,
                        ));
                    }
                }
            }
        }

        // separa le stelle
        let stars = objects.filter(obj => obj instanceof Star);
        //console.log(stars.length)

        // Creazione dust lump
        for (let i = 0; i < N_LUMPS; i++) {
            let x = randomX();
            let y = randomY();
            let z = randomZ();

            let field = computeFieldAtPoint(x, y, z, stars);

            objects.push(new DustLump(
                x,
                y,
                z,
                N_DUST,
                R_LUMP,
                field // <-- puoi salvarlo se vuoi usarlo
            ));
        }

        draw();



        let saldo = 100;

        function buy(checkbox, prezzo, freqName = '') {
            const displaySaldo = document.getElementById('balance');

            if (saldo >= prezzo) {
                saldo -= prezzo;
                displaySaldo.textContent = saldo;

                // Blocco permanente
                checkbox.disabled = true;

                // Aggiunge lo stile di sblocco all'etichetta (label)
                const label = checkbox.nextElementSibling;
                label.classList.add('unlocked-text');
            } else {
                alert("No tienes bastante Cosmonedas!");
                checkbox.checked = false;
            }


            if (checkbox.checked) {
                // 1. Trova la frequenza nell'array
                const freq = frequencies.find(f => f.name === freqName);

                if (freq) {
                    freq.enabled = true;

                    // 2. Abilita il radio button nel DOM
                    const radios = document.querySelectorAll('input[name="frequency"]');

                    radios.forEach(radio => {
                        if (radio.value === freqName) {
                            radio.disabled = false;

                            // opzionale: rimuovi stile "disabled"
                            radio.parentElement.classList.remove("disabled");
                        }
                    });
                }
            }
        }

    </script>

</body>

</html>
